<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Model — CSS Box Model Visualizer</title>
<meta name="description" content="Visualize CSS box model. Adjust margin, border, padding, content interactively. Copy CSS. Free.">
<meta property="og:title" content="Box Model — CSS Box Model Visualizer">
<meta property="og:description" content="Interactive CSS box model visualizer. Adjust values, copy CSS. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/box-model/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}

.layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

.visual{display:flex;align-items:center;justify-content:center}
.box-model{position:relative;text-align:center}
.layer{display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.layer-margin{background:rgba(251,146,60,0.15);border:1px dashed rgba(251,146,60,0.4)}
.layer-border{background:rgba(250,204,21,0.2);border:1px solid rgba(250,204,21,0.5)}
.layer-padding{background:rgba(59,130,246,0.15);border:1px dashed rgba(59,130,246,0.4)}
.layer-content{background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.5)}
.layer-label{position:absolute;font-size:0.65rem;font-weight:600;opacity:0.7}
.label-margin{top:2px;left:4px;color:#fb923c}
.label-border{top:2px;left:4px;color:#facc15}
.label-padding{top:2px;left:4px;color:#3b82f6}
.label-content{color:#10b981;font-family:'Fira Code',monospace;font-size:0.75rem}
.val{font-family:'Fira Code',monospace;font-size:0.68rem;color:#888;position:absolute}

.controls{background:#161616;border:1px solid #222;border-radius:12px;padding:20px}
.ctrl-group{margin-bottom:16px}
.ctrl-group h3{font-size:0.82rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ctrl-group h3 .dot{width:10px;height:10px;border-radius:2px}
.ctrl-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.ctrl-item{text-align:center}
.ctrl-item label{display:block;font-size:0.68rem;color:#555;margin-bottom:2px}
.ctrl-item input{width:100%;padding:6px;border-radius:6px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.82rem;text-align:center;outline:none}
.ctrl-item input:focus{border-color:#3b82f6}

.sizing{margin-bottom:16px}
.sizing label{font-size:0.78rem;color:#888;display:flex;align-items:center;gap:6px;cursor:pointer}
.sizing input{accent-color:#3b82f6}

.total{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:10px;margin-bottom:16px}
.total-row{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:4px}
.total-row:last-child{margin-bottom:0}
.total-row .lbl{color:#555}
.total-row .val{font-family:'Fira Code',monospace;color:#4da6ff}

.output{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer;margin-bottom:16px}
.output:hover{border-color:#3b82f6}
.output pre{font-family:'Fira Code',monospace;font-size:0.78rem;color:#10b981;white-space:pre-wrap}
.output .hint{font-size:0.72rem;color:#555;margin-top:6px}

.presets{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>Box Model</h1>
<p class="subtitle">Interactive CSS box model visualizer.</p>

<div class="presets">
  <button class="preset-btn" onclick="preset(20,2,15,200,150)">Card</button>
  <button class="preset-btn" onclick="preset(0,1,10,100,40)">Button</button>
  <button class="preset-btn" onclick="preset(16,0,0,300,200)">Image</button>
  <button class="preset-btn" onclick="preset(8,1,16,250,50)">Input</button>
  <button class="preset-btn" onclick="preset(0,0,0,100,100)">Reset</button>
</div>

<div class="layout">
  <div class="visual" id="visualBox"></div>
  <div class="controls">
    <div class="ctrl-group">
      <h3><span class="dot" style="background:#fb923c"></span> Margin</h3>
      <div class="ctrl-row">
        <div class="ctrl-item"><label>Top</label><input type="number" id="mt" value="20" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Right</label><input type="number" id="mr" value="20" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Bottom</label><input type="number" id="mb" value="20" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Left</label><input type="number" id="ml" value="20" min="0" oninput="update()"></div>
      </div>
    </div>
    <div class="ctrl-group">
      <h3><span class="dot" style="background:#facc15"></span> Border</h3>
      <div class="ctrl-row">
        <div class="ctrl-item"><label>Top</label><input type="number" id="bt" value="2" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Right</label><input type="number" id="br_" value="2" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Bottom</label><input type="number" id="bb" value="2" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Left</label><input type="number" id="bl" value="2" min="0" oninput="update()"></div>
      </div>
    </div>
    <div class="ctrl-group">
      <h3><span class="dot" style="background:#3b82f6"></span> Padding</h3>
      <div class="ctrl-row">
        <div class="ctrl-item"><label>Top</label><input type="number" id="pt" value="15" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Right</label><input type="number" id="pr" value="15" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Bottom</label><input type="number" id="pb" value="15" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Left</label><input type="number" id="pl" value="15" min="0" oninput="update()"></div>
      </div>
    </div>
    <div class="ctrl-group">
      <h3><span class="dot" style="background:#10b981"></span> Content</h3>
      <div class="ctrl-row" style="grid-template-columns:1fr 1fr">
        <div class="ctrl-item"><label>Width</label><input type="number" id="cw" value="200" min="0" oninput="update()"></div>
        <div class="ctrl-item"><label>Height</label><input type="number" id="ch" value="150" min="0" oninput="update()"></div>
      </div>
    </div>
    <div class="sizing">
      <label><input type="checkbox" id="borderBox" onchange="update()"> box-sizing: border-box</label>
    </div>
  </div>
</div>

<div class="total" id="totals"></div>

<div class="output" onclick="copyCSS()">
  <pre id="cssOutput"></pre>
  <div class="hint">Click to copy CSS</div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/box-model">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
function v(id){return Math.max(0,+document.getElementById(id).value||0)}

function preset(m,b,p,w,h){
  ['mt','mr','mb','ml'].forEach(id=>document.getElementById(id).value=m);
  ['bt','br_','bb','bl'].forEach(id=>document.getElementById(id).value=b);
  ['pt','pr','pb','pl'].forEach(id=>document.getElementById(id).value=p);
  document.getElementById('cw').value=w;
  document.getElementById('ch').value=h;
  update();
}

function update(){
  const mt=v('mt'),mr=v('mr'),mb=v('mb'),ml=v('ml');
  const bt=v('bt'),br=v('br_'),bb=v('bb'),bl=v('bl');
  const pt=v('pt'),pr=v('pr'),pb=v('pb'),pl=v('pl');
  const cw=v('cw'),ch=v('ch');
  const isBorderBox=document.getElementById('borderBox').checked;

  // Scale factor for visualization (max 400px total)
  const totalW=ml+bl+pl+cw+pr+br+mr;
  const totalH=mt+bt+pt+ch+pb+bb+mb;
  const scale=Math.min(1,380/Math.max(totalW,totalH,1));
  const s=n=>Math.max(8,Math.round(n*scale));

  // Render visual
  const marginW=s(ml)+s(bl)+s(pl)+s(cw)+s(pr)+s(br)+s(mr);
  const marginH=s(mt)+s(bt)+s(pt)+s(ch)+s(pb)+s(bb)+s(mb);

  document.getElementById('visualBox').innerHTML=`
    <div class="box-model">
      <div class="layer layer-margin" style="padding:${s(mt)}px ${s(mr)}px ${s(mb)}px ${s(ml)}px;position:relative">
        <span class="layer-label label-margin">margin</span>
        <div class="layer layer-border" style="padding:${s(bt)}px ${s(br)}px ${s(bb)}px ${s(bl)}px;position:relative">
          <span class="layer-label label-border">border</span>
          <div class="layer layer-padding" style="padding:${s(pt)}px ${s(pr)}px ${s(pb)}px ${s(pl)}px;position:relative">
            <span class="layer-label label-padding">padding</span>
            <div class="layer layer-content" style="width:${s(cw)}px;height:${s(ch)}px;display:flex;align-items:center;justify-content:center">
              <span class="label-content">${cw}×${ch}</span>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Totals
  let actualW,actualH;
  if(isBorderBox){
    actualW=cw;actualH=ch;
  }else{
    actualW=cw+pl+pr+bl+br;
    actualH=ch+pt+pb+bt+bb;
  }
  const outerW=actualW+ml+mr+(isBorderBox?0:0);
  const outerH=actualH+mt+mb+(isBorderBox?0:0);
  if(isBorderBox){
    // border-box: width includes padding+border
  }

  document.getElementById('totals').innerHTML=`
    <div class="total-row"><span class="lbl">Content</span><span class="val">${cw} × ${ch}</span></div>
    <div class="total-row"><span class="lbl">+ Padding</span><span class="val">${cw+pl+pr} × ${ch+pt+pb}</span></div>
    <div class="total-row"><span class="lbl">+ Border</span><span class="val">${cw+pl+pr+bl+br} × ${ch+pt+pb+bt+bb}</span></div>
    <div class="total-row"><span class="lbl">+ Margin (outer)</span><span class="val">${cw+pl+pr+bl+br+ml+mr} × ${ch+pt+pb+bt+bb+mt+mb}</span></div>
    ${isBorderBox?`<div class="total-row"><span class="lbl">box-sizing</span><span class="val">border-box (width=${cw}px includes padding+border)</span></div>`:''}
  `;

  // CSS output
  const shorthand=(t,r,b,l)=>{
    if(t===r&&r===b&&b===l)return t+'px';
    if(t===b&&r===l)return`${t}px ${r}px`;
    return`${t}px ${r}px ${b}px ${l}px`;
  };
  let css=`width: ${cw}px;\nheight: ${ch}px;\n`;
  if(mt||mr||mb||ml)css+=`margin: ${shorthand(mt,mr,mb,ml)};\n`;
  if(pt||pr||pb||pl)css+=`padding: ${shorthand(pt,pr,pb,pl)};\n`;
  if(bt||br||bb||bl){
    if(bt===br&&br===bb&&bb===bl)css+=`border: ${bt}px solid #333;\n`;
    else css+=`border-width: ${shorthand(bt,br,bb,bl)};\nborder-style: solid;\nborder-color: #333;\n`;
  }
  if(isBorderBox)css+=`box-sizing: border-box;\n`;

  document.getElementById('cssOutput').textContent=css;
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent='CSS Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

update();
</script>
</body>
</html>
